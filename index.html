<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Marketing Calendar 2026</title>
    <link rel="stylesheet" href="styles.css?v=4" />
  </head>
  <body>
    <div id="app">
      <header class="header">
        <div class="header-title">
          <h1 class="logo">Marketing Calendar</h1>
          <span class="year-badge">2026</span>
        </div>
        <div class="header-controls">
          <div class="view-toggle">
            <button class="view-btn active" data-view="calendar">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <rect x="1" y="2" width="14" height="12" rx="2" stroke="currentColor" stroke-width="1.5" fill="none"/>
                <line x1="1" y1="6" x2="15" y2="6" stroke="currentColor" stroke-width="1.5"/>
                <line x1="5.5" y1="2" x2="5.5" y2="14" stroke="currentColor" stroke-width="1" opacity="0.3"/>
                <line x1="10.5" y1="2" x2="10.5" y2="14" stroke="currentColor" stroke-width="1" opacity="0.3"/>
              </svg>
              Grid
            </button>
            <button class="view-btn" data-view="timeline">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <line x1="2" y1="4" x2="14" y2="4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                <line x1="2" y1="8" x2="11" y2="8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                <line x1="2" y1="12" x2="13" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
              Timeline
            </button>
          </div>
          <button class="suggest-btn" id="suggest-btn">Suggest</button>
          <button class="add-event-btn" id="add-event-btn">+ Add Event</button>
          <button class="settings-btn" id="settings-btn" title="Settings">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
              <path d="M7.5 2.25L7.94 3.89a5.25 5.25 0 011.8 1.04l1.6-.53 1.5 2.6-1.17 1.1a5.3 5.3 0 010 2.08l1.17 1.1-1.5 2.6-1.6-.53a5.25 5.25 0 01-1.8 1.04L7.5 15.75h-3l-.44-1.64a5.25 5.25 0 01-1.8-1.04l-1.6.53-1.5-2.6 1.17-1.1a5.3 5.3 0 010-2.08l-1.17-1.1 1.5-2.6 1.6.53a5.25 5.25 0 011.8-1.04L4.5 2.25h3z" stroke="currentColor" stroke-width="1.5" fill="none" transform="translate(3,0)"/>
              <circle cx="9" cy="9" r="2" stroke="currentColor" stroke-width="1.5" fill="none"/>
            </svg>
          </button>
          <div class="header-divider"></div>
          <div class="filter-bar">
            <button class="filter-btn active" data-filter="all">All</button>
          </div>
        </div>
      </header>

      <main class="main">
        <div id="calendar-view" class="calendar-grid"></div>
        <div id="timeline-view" class="timeline-view" style="display: none"></div>
      </main>

      <!-- Event Detail Modal -->
      <div id="modal-overlay" class="modal-overlay" style="display: none">
        <div class="modal">
          <button class="modal-close" id="modal-close">&times;</button>
          <div id="modal-content"></div>
        </div>
      </div>
    </div>

    <script src="data.js?v=4"></script>
    <script src="app.js?v=4"></script>
  </body>
</html>
